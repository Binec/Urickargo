          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-20px); }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { margin: 0; background: #fff; }
        button, a { -webkit-tap-highlight-color: transparent; }

        .btn-short-text { display: none; }
        @media (max-width: 768px) {
          .btn-full-text { display: none; }
          .btn-short-text { display: inline; }
          .service-mobile-full-text .btn-full-text { display: inline !important; }
          .service-mobile-full-text .btn-short-text { display: none !important; }
        }

        .cta-main-btn::after {
          content: '';
          position: absolute;
          top: 50%;
          left: 50%;
          width: 0;
          height: 0;
          background: rgba(255, 140, 66, 0.2);
          border-radius: 50%;
          transform: translate(-50%, -50%);
          transition: width 0.5s ease, height 0.5s ease;
          pointer-events: none;
          z-index: 0;
        }

        .cta-main-btn:hover::after {
          width: 300px;
          height: 300px;
        }

        .cta-main-btn .btn-full-text,

          position: relative;
